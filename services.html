<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | Dekor By </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C9A84C',
                        dark: '#1A1A1A',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F8F8F8] text-[#1A1A1A]">

    <a href="https://wa.me/60123456789" target="_blank" 
       class="fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full flex items-center justify-center shadow-lg transition hover:scale-110" 
       style="background-color: #25D366;">
        <span class="text-white text-2xl">💬</span>
    </a>

    <header class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <span class="text-gold text-2xl">✦</span>
                <span class="text-lg font-semibold tracking-tight text-dark">Decor By </span>
            </a>
            <nav class="hidden md:flex gap-8 text-sm">
                <a href="index.html" class="text-[#333333] hover:text-dark transition">Home</a>
                <a href="gallery.html" class="text-[#333333] hover:text-dark transition">Gallery</a>
                <a href="services.html" class="text-dark font-medium border-b-2 border-gold pb-1">Services</a>
                <a href="faq.html" class="text-[#333333] hover:text-dark transition">FAQ</a>
                <a href="contact.html" class="bg-dark text-white px-5 py-2 rounded-full text-sm font-medium hover:bg-gold hover:text-dark transition">Contact</a>
            </nav>
            <button id="menuBtn" class="md:hidden text-2xl text-dark">☰</button>
        </div>
        <div id="mobileMenu" class="hidden md:hidden px-5 pb-4 space-y-2 text-sm font-medium bg-white">
            <a href="index.html" class="block py-2 text-[#333333] pl-3">Home</a>
            <a href="gallery.html" class="block py-2 text-[#333333] pl-3">Gallery</a>
            <a href="services.html" class="block py-2 text-dark border-l-2 border-gold pl-3">Services</a>
            <a href="faq.html" class="block py-2 text-[#333333] pl-3">FAQ</a>
            <a href="contact.html" class="block py-2 text-white bg-dark text-center rounded-full mt-2">Contact</a>
        </div>
    </header>

    <section class="max-w-3xl mx-auto px-5 py-12">
        <div class="text-center mb-10">
            <div class="gold-line mb-4"></div>
            <h2 class="text-2xl font-light tracking-tight">Our Services</h2>
            <p class="text-[#333333] text-sm mt-3">Choose any service package. We customize everything according to your needs.</p>
        </div>
        
        <div id="servicesList" class="space-y-4">
            <div class="text-center py-8 text-sm text-gray-400">Loading services...</div>
        </div>
        
        <div class="text-center mt-10">
            <a href="contact.html" class="inline-block bg-gold text-dark px-8 py-3.5 rounded-full font-semibold hover:bg-[#B8993F] transition">Request a Quote</a>
        </div>
    </section>

    <footer class="bg-dark border-t border-gray-800 text-center py-8 px-5 mt-8">
        <p class="text-gold text-lg mb-2">✦</p>
        <p class="text-gray-500 text-xs">© 2026 Decor By. All rights reserved.</p>
    </footer>

    <script src="config.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/services-catalog.js"></script>
</body>
</html>
