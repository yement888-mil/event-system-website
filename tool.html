<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotation Tool | Dekor By</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C9A84C',
                        dark: '#1A1A1A',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F8F8F8] text-[#1A1A1A]">

    <header class="bg-dark text-white py-4 px-5">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <span class="text-gold font-semibold">Quotation Tool</span>
            <button onclick="logout()" class="text-gray-400 text-xs hover:text-white">
            Logout
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-5 py-8">
        
        <!-- Password Gate -->
        <div id="passwordGate" class="text-center py-16">
            <div class="text-gold text-4xl mb-4">🔐</div>
            <h2 class="text-xl font-semibold mb-2">Password Required</h2>
            <input type="password" id="toolPassword" class="border border-gray-200 rounded-xl px-4 py-3 text-sm text-center mt-4" placeholder="Enter password">
            <button onclick="checkPassword()" class="block mx-auto mt-3 bg-dark text-white px-6 py-2 rounded-full text-sm font-medium hover:bg-gold hover:text-dark transition">Unlock</button>
            <p id="passwordError" class="text-red-500 text-xs mt-2 hidden">Incorrect password</p>
        </div>

        <!-- Main Tool (hidden until password) -->
        <div id="toolContent" class="hidden">
            
            <!-- Inquiry List -->
            <section class="mb-8">
                <h2 class="text-lg font-semibold mb-3">Latest Inquiries</h2>
                <div id="inquiryList" class="space-y-2">
                    <p class="text-sm text-gray-500">Loading...</p>
                </div>
            </section>

            <!-- Quotation Generator -->
            <section class="bg-white rounded-2xl p-6 shadow-sm">
                <h2 class="text-lg font-semibold mb-4">Generate Quotation</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Select Inquiry</label>
                    <select id="inquirySelect" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm">
                        <option value="">-- Select --</option>
                    </select>
                </div>

                <div id="quotationForm" class="hidden space-y-4">
                    <div class="bg-[#F8F8F8] p-4 rounded-xl text-sm" id="inquiryPreview"></div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-sm">Decoration (RM)</label>
                            <input type="number" id="priceDeco" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" placeholder="0">
                        </div>
                        <div>
                            <label class="text-sm">Photography (RM)</label>
                            <input type="number" id="pricePhoto" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" placeholder="0">
                        </div>
                        <div>
                            <label class="text-sm">Catering (RM)</label>
                            <input type="number" id="priceCatering" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" placeholder="0">
                        </div>
                        <div>
                            <label class="text-sm">Magic Show (RM)</label>
                            <input type="number" id="priceMagic" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" placeholder="0">
                        </div>
                    </div>

                    <div class="bg-[#F5F0E6] p-4 rounded-xl text-sm space-y-1">
                        <p>Total: <strong id="totalPrice">RM 0</strong></p>
                        <p>Deposit (30%): <strong id="depositPrice">RM 0</strong></p>
                        <p>Balance: <strong id="balancePrice">RM 0</strong></p>
                    </div>

                    <button onclick="generateQuotation()" class="w-full bg-dark text-white py-3 rounded-full font-semibold hover:bg-gold hover:text-dark transition">
                        Generate WhatsApp Message
                    </button>

                    <div id="whatsappOutput" class="hidden bg-[#F8F8F8] p-4 rounded-xl text-sm whitespace-pre-line"></div>
                    <button id="copyBtn" class="hidden w-full border-2 border-dark text-dark py-2 rounded-full font-medium text-sm hover:bg-dark hover:text-white transition" onclick="copyToClipboard()">
                        Copy Text
                    </button>
                </div>
            </section>
        </div>
    </main>

    <script src="config.js"></script>
    <script>
        let adminToken = localStorage.getItem('adminToken') || '';

        function escapeHTML(str) {
            if (!str) return '';

            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        async function checkPassword() {
            const input = document.getElementById('toolPassword').value;

            try {
                const res = await fetch(`${CONFIG.API_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: input
                    })
                });

                const data = await res.json();

                if (data.success) {
                    adminToken = data.token;

                    localStorage.setItem('adminToken', adminToken);

                    document.getElementById('passwordGate').classList.add('hidden');
                    document.getElementById('toolContent').classList.remove('hidden');

                    loadInquiries();

                } else {
                    document.getElementById('passwordError').classList.remove('hidden');
                }

            } catch (error) {
                console.error('Login error:', error);

                document.getElementById('passwordError').textContent = 'Login failed';
                document.getElementById('passwordError').classList.remove('hidden');
            }
        }

        async function loadInquiries() {
            try {
                const res = await fetch(`${CONFIG.API_URL}/api/inquiry`, {
                    headers: {
                        Authorization: `Bearer ${adminToken}`
                    }
                });
                const data = await res.json();

                if (res.status === 401 || res.status === 403) {
                    logout();
                    return;
                }
                
                const list = document.getElementById('inquiryList');
                const select = document.getElementById('inquirySelect');
                
                if (!data.data || data.data.length === 0) {
                    list.innerHTML = '<p class="text-sm text-gray-500">No inquiries yet.</p>';
                    return;
                }

                list.innerHTML = data.data.map((inq) => `
                    <div class="bg-white rounded-xl p-3 text-sm border border-gray-100">
                        <strong>${escapeHTML(inq.customer_name)}</strong> — ${escapeHTML(inq.event_type || '-')} | ${inq.event_date ? new Date(inq.event_date).toLocaleDateString('ms-MY') : '-'} | ${escapeHTML(inq.guest_count || '-')} pax
                        <span class="text-xs text-gray-400 ml-2">${new Date(inq.created_at).toLocaleDateString('ms-MY')}</span>
                    </div>
                `).join('');

                select.innerHTML = '<option value="">-- Select --</option>' + data.data.map(inq => `
                    <option value='${JSON.stringify(inq).replace(/'/g, "&#39;")}'>${escapeHTML(inq.customer_name)} - ${inq.event_date || '?'}</option>
                `).join('');

            } catch (err) {
                document.getElementById('inquiryList').innerHTML = '<p class="text-sm text-red-500">Failed to load inquiries.</p>';
            }
        }

        document.getElementById('inquirySelect').addEventListener('change', function() {
            if (this.value) {
                document.getElementById('quotationForm').classList.remove('hidden');
                const inq = JSON.parse(this.value);
                const services = inq.services_requested || [];
                document.getElementById('inquiryPreview').innerHTML = `
                    <strong>${escapeHTML(inq.customer_name)}</strong> | ${inq.phone}<br>
                    ${escapeHTML(inq.event_type || '-')} | ${inq.event_date ? new Date(inq.event_date).toLocaleDateString('ms-MY') : '-'} | ${escapeHTML(inq.guest_count || '-')} pax<br>
                    Services: ${services.map(service => escapeHTML(service)).join(', ')}
                    ${inq.message ? '<br>Mesej: ' + escapeHTML(inq.message) : ''}
                `;
                document.getElementById('whatsappOutput').classList.add('hidden');
                document.getElementById('copyBtn').classList.add('hidden');
                document.getElementById('priceDeco').value = '';
                document.getElementById('pricePhoto').value = '';
                document.getElementById('priceCatering').value = '';
                document.getElementById('priceMagic').value = '';
                document.getElementById('totalPrice').textContent = 'RM 0';
                document.getElementById('depositPrice').textContent = 'RM 0';
                document.getElementById('balancePrice').textContent = 'RM 0';
            }
        });

        function calculate() {
            const d = parseInt(document.getElementById('priceDeco').value) || 0;
            const p = parseInt(document.getElementById('pricePhoto').value) || 0;
            const c = parseInt(document.getElementById('priceCatering').value) || 0;
            const m = parseInt(document.getElementById('priceMagic').value) || 0;
            const total = d + p + c + m;
            document.getElementById('totalPrice').textContent = 'RM ' + total;
            document.getElementById('depositPrice').textContent = 'RM ' + Math.round(total * 0.3);
            document.getElementById('balancePrice').textContent = 'RM ' + Math.round(total * 0.7);
        }

        ['priceDeco', 'pricePhoto', 'priceCatering', 'priceMagic'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculate);
        });

        function generateQuotation() {
            const inq = JSON.parse(document.getElementById('inquirySelect').value);
            const services = inq.services_requested || [];
            const d = parseInt(document.getElementById('priceDeco').value) || 0;
            const p = parseInt(document.getElementById('pricePhoto').value) || 0;
            const c = parseInt(document.getElementById('priceCatering').value) || 0;
            const m = parseInt(document.getElementById('priceMagic').value) || 0;
            const total = d + p + c + m;
            const deposit = Math.round(total * 0.3);
            const balance = Math.round(total * 0.7);
            const dateObj = inq.event_date ? new Date(inq.event_date) : null;
            const formattedDate = dateObj ? dateObj.toLocaleDateString('en-MY', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) : '-';

            let lines = [];
            lines.push(`Hi ${inq.customer_name},`);
            lines.push('');
            lines.push('Thank you for your inquiry. Please find your quotation details below.');
            lines.push('');

            lines.push('QUOTATION');
            lines.push('--------------------');

            lines.push(`Event Type: ${inq.event_type || 'Event'}`);
            lines.push(`Event Date: ${formattedDate}`);
            lines.push(`Guests: ${escapeHTML(inq.guest_count || '-')} pax`);

            lines.push('');
            lines.push('Selected Services');

            if (services.includes('deco')) lines.push(`Decoration: RM ${d}`);
            if (services.includes('photo')) lines.push(`Photography: RM ${p}`);
            if (services.includes('catering')) lines.push(`Catering: RM ${c}`);
            if (services.includes('magic')) lines.push(`Magic Show: RM ${m}`);

            lines.push('');
            lines.push('--------------------');
            lines.push(`Total: RM ${total}`);
            lines.push(`Deposit (30%): RM ${deposit}`);
            lines.push(`Balance: RM ${balance}`);
            lines.push('--------------------');

            lines.push('');
            lines.push('Payment Details');
            lines.push('Maybank 5xxxxx');
            lines.push('Dekor By Ana');

            lines.push('');
            lines.push('FAQ: dekorbyana.com/faq');
            lines.push('');
            lines.push('If you have any questions, please reply to this WhatsApp message.');
        
            const output = lines.join('\n');
            document.getElementById('whatsappOutput').textContent = output;
            document.getElementById('whatsappOutput').classList.remove('hidden');
            document.getElementById('copyBtn').classList.remove('hidden');
        }

        function logout() {
            localStorage.removeItem('adminToken');

            adminToken = '';

            document.getElementById('toolContent').classList.add('hidden');
            document.getElementById('passwordGate').classList.remove('hidden');

            document.getElementById('toolPassword').value = '';
        }


        window.onload = async () => {
            if (adminToken) {
                document.getElementById('passwordGate').classList.add('hidden');
                document.getElementById('toolContent').classList.remove('hidden');

                loadInquiries();
            }
        };

        function copyToClipboard() {
            const text = document.getElementById('whatsappOutput').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('Quotation copied successfully.');
            });
        }
    </script>
</body>
</html>
