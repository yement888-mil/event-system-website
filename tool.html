<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dekor By Ana | Owner Dashboard</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C9A84C',
                        dark: '#1A1A1A',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F8F8F8] text-[#1A1A1A]">

    <header class="bg-dark text-white py-4 px-5">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <span class="text-gold font-semibold">Dekor By Ana</span>
            <button onclick="logout()" class="text-gray-400 text-xs hover:text-white">Logout</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-5 py-8">

        <!-- Password Gate -->
        <div id="passwordGate" class="text-center py-16">
            <div class="text-gold text-4xl mb-4">🔐</div>
            <h2 class="text-xl font-semibold mb-2">Password Required</h2>
            <input type="password" id="toolPassword" class="border border-gray-200 rounded-xl px-4 py-3 text-sm text-center mt-4 w-64" placeholder="Enter password" />
            <button onclick="checkPassword()" class="block mx-auto mt-3 bg-dark text-white px-6 py-2 rounded-full text-sm font-medium hover:bg-gold hover:text-dark transition">Unlock</button>
            <p id="passwordError" class="text-red-500 text-xs mt-2 hidden">Incorrect password</p>
        </div>

        <!-- Main Tool -->
        <div id="toolContent" class="hidden">

            <!-- DASHBOARD -->
            <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white rounded-2xl p-4 shadow-sm">
                    <p class="text-xs text-gray-400">New Inquiries</p>
                    <p class="text-2xl font-bold" id="statNewInquiries">0</p>
                </div>
                <div class="bg-white rounded-2xl p-4 shadow-sm">
                    <p class="text-xs text-gray-400">Quotations Sent</p>
                    <p class="text-2xl font-bold" id="statSent">0</p>
                </div>
                <div class="bg-white rounded-2xl p-4 shadow-sm">
                    <p class="text-xs text-gray-400">Deposit Pending</p>
                    <p class="text-2xl font-bold text-gold" id="statDepositPending">RM 0</p>
                </div>
                <div class="bg-white rounded-2xl p-4 shadow-sm">
                    <p class="text-xs text-gray-400">Upcoming Events</p>
                    <p class="text-2xl font-bold" id="statUpcoming">0</p>
                </div>
            </section>

            <!-- Customer Search -->
            <section class="bg-white rounded-2xl p-6 shadow-sm mb-8">
                <h2 class="text-lg font-semibold mb-3">Find Customer</h2>
                <div class="flex gap-3">
                    <input type="text" id="customerSearch" placeholder="Search by name, phone..." class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm" />
                    <button onclick="searchCustomer()" class="bg-dark text-white px-6 py-2 rounded-full text-sm font-medium hover:bg-gold hover:text-dark transition">Search</button>
                </div>
                <div id="searchResults" class="mt-3 space-y-2"></div>
            </section>

            <!-- Quotation Generator -->
            <section class="bg-white rounded-2xl p-6 shadow-sm mb-8">
                <h2 class="text-lg font-semibold mb-4">Generate Quotation</h2>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Select Inquiry</label>
                    <select id="inquirySelect" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm">
                        <option value="">-- Select --</option>
                    </select>
                </div>

                <div id="quotationForm" class="hidden space-y-4">
                    <div class="bg-[#F8F8F8] p-4 rounded-xl text-sm" id="inquiryPreview"></div>

                    <!-- Package Templates -->
                    <div>
                        <label class="block text-sm font-medium mb-1">Package Template</label>
                        <select id="packageSelect" onchange="applyPackage()" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm">
                            <option value="">-- Custom --</option>
                            <option value="birthday_basic">Birthday Basic</option>
                            <option value="birthday_premium">Birthday Premium</option>
                            <option value="wedding">Wedding Package</option>
                            <option value="corporate">Corporate Event</option>
                        </select>
                    </div>

                    <!-- Dynamic Services -->
                    <div>
                        <label class="block text-sm font-medium mb-1">Services</label>
                        <div id="serviceRows" class="space-y-2">
                            <div class="flex gap-2 items-center">
                                <input type="text" placeholder="Service name" class="service-name w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
                                <input type="number" placeholder="Price (RM)" class="service-price w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
                                <button onclick="removeServiceRow(this)" class="text-red-500 text-sm px-2">✕</button>
                            </div>
                        </div>
                        <button onclick="addServiceRow()" class="text-gold text-sm font-medium hover:underline mt-2">+ Add Service</button>
                    </div>

                    <div class="bg-[#F5F0E6] p-4 rounded-xl text-sm space-y-1">
                        <p>Total: <strong id="totalPrice">RM 0</strong></p>
                        <p>Deposit (30%): <strong id="depositPrice">RM 0</strong></p>
                        <p>Balance: <strong id="balancePrice">RM 0</strong></p>
                        <p>Valid Until: <strong id="validUntil">-</strong></p>
                    </div>

                    <button onclick="generateQuotation()" class="w-full bg-dark text-white py-3 rounded-full font-semibold hover:bg-gold hover:text-dark transition">
                        <span id="saveQuotationText">Generate & Save Quotation</span>
                    </button>

                    <!-- WhatsApp & PDF -->
                    <div class="flex gap-3">
                        <button onclick="generateWhatsApp()" class="w-full border-2 border-green-600 text-green-600 py-3 rounded-full font-semibold hover:bg-green-600 hover:text-white transition">
                            📱 WhatsApp
                        </button>
                        <button onclick="generatePDF()" class="w-full border-2 border-dark text-dark py-3 rounded-full font-semibold hover:bg-dark hover:text-white transition">
                            📄 PDF
                        </button>
                    </div>

                    <div id="whatsappOutput" class="hidden bg-[#F8F8F8] p-4 rounded-xl text-sm whitespace-pre-line"></div>
                    <button id="copyBtn" class="hidden w-full border-2 border-dark text-dark py-2 rounded-full font-medium text-sm hover:bg-dark hover:text-white transition" onclick="copyToClipboard()">Copy Text</button>
                </div>
            </section>

            <!-- Quotation History -->
            <section class="bg-white rounded-2xl p-6 shadow-sm">
                <h2 class="text-lg font-semibold mb-4">Quotation History</h2>
                <div id="quotationHistory" class="space-y-3">
                    <p class="text-sm text-gray-500">Loading...</p>
                </div>
            </section>
        </div>
    </main>

    <script>
        const CONFIG = {
            API_URL: 'https://event-system-backend-production.up.railway.app'
        };

        // ------------------------------------------------------------
        // STATE
        // ------------------------------------------------------------
        let adminToken = localStorage.getItem('adminToken') || '';
        let editingQuotationId = null;
        let savingQuotation = false;
        let allInquiries = [];

        // ------------------------------------------------------------
        // PACKAGE TEMPLATES
        // ------------------------------------------------------------
        const PACKAGES = {
            birthday_basic: [
                { name: 'Backdrop', price: 800 },
                { name: 'Balloon Decoration', price: 200 },
                { name: 'Cake Table Setup', price: 150 }
            ],
            birthday_premium: [
                { name: 'Backdrop', price: 1800 },
                { name: 'Balloon Decoration', price: 300 },
                { name: 'Cake Table Setup', price: 500 },
                { name: 'Photography', price: 400 }
            ],
            wedding: [
                { name: 'Wedding Arch', price: 2500 },
                { name: 'Flower Decoration', price: 1200 },
                { name: 'Cake Table Setup', price: 600 },
                { name: 'Photography', price: 1500 },
                { name: 'Sound System', price: 800 }
            ],
            corporate: [
                { name: 'Stage Setup', price: 2000 },
                { name: 'Backdrop', price: 1500 },
                { name: 'Photography', price: 1200 },
                { name: 'Catering Setup', price: 1000 }
            ]
        };

        function applyPackage() {
            const pkg = document.getElementById('packageSelect').value;
            if (!pkg || !PACKAGES[pkg]) return;
            const container = document.getElementById('serviceRows');
            container.innerHTML = '';
            PACKAGES[pkg].forEach(s => addServiceRow(s.name, s.price));
            calculate();
        }

        // ------------------------------------------------------------
        // HELPERS
        // ------------------------------------------------------------
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // ------------------------------------------------------------
        // AUTH
        // ------------------------------------------------------------
        async function checkPassword() {
            const input = document.getElementById('toolPassword').value;
            try {
                const res = await fetch(`${CONFIG.API_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: input })
                });
                if (!res.ok) throw new Error('API error');
                const data = await res.json();
                if (data.success) {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', adminToken);
                    document.getElementById('passwordGate').classList.add('hidden');
                    document.getElementById('toolContent').classList.remove('hidden');
                    loadInquiries();
                    loadQuotations();
                } else {
                    document.getElementById('passwordError').classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                alert('Login failed.');
            }
        }

        // ------------------------------------------------------------
        // DASHBOARD STATS
        // ------------------------------------------------------------
        function updateDashboard(quotations, inquiries) {
            const now = new Date();
            const thisMonth = now.getMonth();
            const thisYear = now.getFullYear();

            const newInquiries = inquiries.filter(i => {
                const d = new Date(i.created_at);
                return d.getMonth() === thisMonth && d.getFullYear() === thisYear;
            }).length;

            const sent = quotations.filter(q => q.status === 'sent' || q.status === 'waiting_deposit').length;

            const depositPending = quotations
                .filter(q => q.status === 'waiting_deposit')
                .reduce((sum, q) => sum + (q.deposit || 0), 0);

            const upcoming = inquiries.filter(i => {
                if (!i.event_date) return false;
                const d = new Date(i.event_date);
                return d >= now;
            }).length;

            document.getElementById('statNewInquiries').textContent = newInquiries;
            document.getElementById('statSent').textContent = sent;
            document.getElementById('statDepositPending').textContent = 'RM ' + depositPending;
            document.getElementById('statUpcoming').textContent = upcoming;
        }

        // ------------------------------------------------------------
        // LOAD INQUIRIES
        // ------------------------------------------------------------
        async function loadInquiries() {
            try {
                const res = await fetch(`${CONFIG.API_URL}/api/inquiry`, {
                    headers: { Authorization: `Bearer ${adminToken}` }
                });
                if (!res.ok) throw new Error('Failed');
                const data = await res.json();
                allInquiries = data.data || [];
                renderInquiries(allInquiries);
            } catch (err) {
                console.error(err);
                document.getElementById('inquiryList').innerHTML = '<p class="text-red-500 text-sm">Failed to load inquiries</p>';
            }
        }

        function renderInquiries(inquiries) {
            const list = document.getElementById('inquiryList');
            const select = document.getElementById('inquirySelect');
            if (!inquiries || inquiries.length === 0) {
                list.innerHTML = 'No inquiries yet';
                select.innerHTML = '<option value="">-- Select --</option>';
                return;
            }
            list.innerHTML = inquiries.slice(0, 5).map(inq => `
                <div class="bg-white rounded-xl p-3 text-sm border">
                    <strong>${escapeHTML(inq.customer_name)}</strong> | ${escapeHTML(inq.event_type || '-')}
                    <br>Event: ${inq.event_date ? new Date(inq.event_date).toLocaleDateString('en-MY') : '-'}
                </div>
            `).join('');

            select.innerHTML = '<option value="">-- Select --</option>' +
                inquiries.map(inq => `
                    <option value='${JSON.stringify(inq).replace(/'/g,"&#39;")}'>${escapeHTML(inq.customer_name)}</option>
                `).join('');
        }

        // ------------------------------------------------------------
        // SEARCH CUSTOMER
        // ------------------------------------------------------------
        function searchCustomer() {
            const q = document.getElementById('customerSearch').value.toLowerCase().trim();
            const results = document.getElementById('searchResults');
            if (!q) { results.innerHTML = ''; return; }
            const found = allInquiries.filter(i =>
                i.customer_name?.toLowerCase().includes(q) ||
                i.phone?.includes(q)
            );
            if (found.length === 0) {
                results.innerHTML = '<p class="text-sm text-gray-500">No customers found</p>';
                return;
            }
            results.innerHTML = found.map(i => `
                <div class="bg-white border rounded-xl p-3 text-sm flex justify-between items-center">
                    <div>
                        <strong>${escapeHTML(i.customer_name)}</strong>
                        <span class="text-gray-400">| ${escapeHTML(i.phone || '-')}</span>
                        <br>${escapeHTML(i.event_type || '-')} | ${i.event_date ? new Date(i.event_date).toLocaleDateString('en-MY') : '-'}
                    </div>
                    <button onclick="selectInquiry(${i.id})" class="bg-gold text-white px-3 py-1 rounded text-xs">Select</button>
                </div>
            `).join('');
        }

        function selectInquiry(id) {
            const select = document.getElementById('inquirySelect');
            for (let i = 0; i < select.options.length; i++) {
                try {
                    const val = JSON.parse(select.options[i].value);
                    if (val.id === id) {
                        select.selectedIndex = i;
                        select.dispatchEvent(new Event('change'));
                        document.getElementById('searchResults').innerHTML = '';
                        document.getElementById('customerSearch').value = '';
                        return;
                    }
                } catch (e) {}
            }
        }

        // ------------------------------------------------------------
        // LOAD QUOTATIONS
        // ------------------------------------------------------------
        async function loadQuotations() {
            try {
                const res = await fetch(`${CONFIG.API_URL}/api/quotation`, {
                    headers: { Authorization: `Bearer ${adminToken}` }
                });
                if (!res.ok) throw new Error('Failed');
                const data = await res.json();
                const quotations = (data.data || []).map(q => {
                    if (typeof q.items === 'string') { try { q.items = JSON.parse(q.items); } catch (e) { q.items = []; } }
                    return q;
                });
                renderQuotations(quotations);
                updateDashboard(quotations, allInquiries);
            } catch (err) {
                console.error(err);
                document.getElementById('quotationHistory').innerHTML = '<p class="text-red-500 text-sm">Failed to load quotations</p>';
            }
        }

        function renderQuotations(quotations) {
            const box = document.getElementById('quotationHistory');
            if (!quotations || quotations.length === 0) {
                box.innerHTML = 'No quotations yet';
                return;
            }
            box.innerHTML = quotations.map(q => `
                <div class="border rounded-xl p-4 text-sm">
                    <strong>${escapeHTML(q.customer_name || 'Unknown')}</strong>
                    ${q.phone ? `| 📱 ${escapeHTML(q.phone)}` : ''}
                    <br>Q-${String(q.id).padStart(5,'0')} | RM ${q.total}
                    <br>Event: ${q.event_date ? new Date(q.event_date).toLocaleDateString('en-MY') : '-'}
                    <br>Status:
                    <select onchange="updateQuotationStatus(${q.id},this.value)" class="border rounded text-xs">
                        <option ${q.status==='draft'?'selected':''}>draft</option>
                        <option ${q.status==='sent'?'selected':''}>sent</option>
                        <option ${q.status==='waiting_deposit'?'selected':''}>waiting_deposit</option>
                        <option ${q.status==='deposit_paid'?'selected':''}>deposit_paid</option>
                        <option ${q.status==='completed'?'selected':''}>completed</option>
                        <option ${q.status==='cancelled'?'selected':''}>cancelled</option>
                    </select>
                    <div class="mt-3 flex gap-2 flex-wrap">
                        <button onclick="duplicateQuotation(${q.id})" class="bg-gold text-white px-3 py-1 rounded text-xs">Duplicate</button>
                        <button onclick="markPaid(${q.id})" class="bg-green-600 text-white px-3 py-1 rounded text-xs">Mark Paid</button>
                        <button onclick="deleteQuotation(${q.id})" class="bg-red-600 text-white px-3 py-1 rounded text-xs">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // ------------------------------------------------------------
        // DUPLICATE QUOTATION
        // ------------------------------------------------------------
        async function duplicateQuotation(id) {
            try {
                const res = await fetch(`${CONFIG.API_URL}/api/quotation/${id}`, {
                    headers: { Authorization: `Bearer ${adminToken}` }
                });
                const data = await res.json();
                const q = data.data || data.quotation || data;
                if (!q) return alert('Quotation not found');
                const items = typeof q.items === 'string' ? JSON.parse(q.items) : (q.items || []);
                const total = items.reduce((s, i) => s + i.price, 0);
                const deposit = Math.round(total * 0.3);
                const balance = Math.round(total * 0.7);
                const now = new Date();
                const validUntil = new Date(now);
                validUntil.setDate(validUntil.getDate() + 7);

                const createRes = await fetch(`${CONFIG.API_URL}/api/quotation`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
                    body: JSON.stringify({
                        inquiry_id: q.inquiry_id,
                        items,
                        total,
                        deposit,
                        balance,
                        valid_until: validUntil.toISOString().split('T')[0]
                    })
                });
                if (createRes.ok) {
                    alert('Quotation duplicated successfully');
                    loadQuotations();
                } else {
                    throw new Error('Duplicate failed');
                }
            } catch (err) {
                console.error(err);
                alert('Duplicate failed: ' + err.message);
            }
        }

        // ------------------------------------------------------------
        // MARK PAID
        // ------------------------------------------------------------
        async function markPaid(id) {
            if (!confirm('Mark this quotation as Deposit Paid?')) return;
            try {
                const res = await fetch(`${CONFIG.API_URL}/api/quotation/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
                    body: JSON.stringify({ status: 'deposit_paid' })
                });
                if (res.ok) {
                    alert('Marked as Deposit Paid');
                    loadQuotations();
                } else {
                    throw new Error('Update failed');
                }
            } catch (err) {
                console.error(err);
                alert('Failed: ' + err.message);
            }
        }

        // ------------------------------------------------------------
        // DYNAMIC SERVICES
        // ------------------------------------------------------------
        function addServiceRow(name = '', price = '') {
            const container = document.getElementById('serviceRows');
            const row = document.createElement('div');
            row.className = 'flex gap-2 items-center';
            row.innerHTML = `
                <input type="text" placeholder="Service name" value="${escapeHTML(name)}" class="service-name w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
                <input type="number" placeholder="Price (RM)" value="${price}" class="service-price w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
                <button onclick="removeServiceRow(this)" class="text-red-500 text-sm px-2">✕</button>
            `;
            container.appendChild(row);
            row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', calculate));
        }

        function removeServiceRow(btn) {
            const container = document.getElementById('serviceRows');
            if (container.children.length <= 1) return alert('At least one service required.');
            btn.closest('.flex').remove();
            calculate();
        }

        // ------------------------------------------------------------
        // INQUIRY SELECT
        // ------------------------------------------------------------
        document.getElementById('inquirySelect').addEventListener('change', function() {
            if (!this.value) {
                document.getElementById('quotationForm').classList.add('hidden');
                return;
            }
            const inq = JSON.parse(this.value);
            document.getElementById('quotationForm').classList.remove('hidden');
            document.getElementById('inquiryPreview').innerHTML = `
                <strong>${escapeHTML(inq.customer_name)}</strong><br>
                ${escapeHTML(inq.event_type || '-')} | ${inq.event_date ? new Date(inq.event_date).toLocaleDateString('en-MY') : '-'}
            `;
            // Reset services
            const container = document.getElementById('serviceRows');
            container.innerHTML = '';
            addServiceRow('', '');
            calculate();
            const now = new Date();
            const valid = new Date(now);
            valid.setDate(valid.getDate() + 7);
            document.getElementById('validUntil').textContent = valid.toLocaleDateString('en-MY');
            document.getElementById('whatsappOutput').classList.add('hidden');
            document.getElementById('copyBtn').classList.add('hidden');
        });

        // ------------------------------------------------------------
        // CALCULATE
        // ------------------------------------------------------------
        function calculate() {
            const prices = document.querySelectorAll('.service-price');
            let total = 0;
            prices.forEach(inp => { total += parseFloat(inp.value) || 0; });
            document.getElementById('totalPrice').textContent = 'RM ' + total;
            document.getElementById('depositPrice').textContent = 'RM ' + Math.round(total * 0.3);
            document.getElementById('balancePrice').textContent = 'RM ' + Math.round(total * 0.7);
        }
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('service-price')) calculate();
        });

        // ------------------------------------------------------------
        // GENERATE QUOTATION
        // ------------------------------------------------------------
        async function generateQuotation() {
            if (savingQuotation) return;
            savingQuotation = true;
            const btn = document.getElementById('saveQuotationBtn');
            btn.disabled = true;
            document.getElementById('saveQuotationText').innerText = 'Saving...';

            try {
                const selectEl = document.getElementById('inquirySelect');
                if (!selectEl.value) { alert('Select an inquiry'); return; }
                const inq = JSON.parse(selectEl.value);

                const nameInputs = document.querySelectorAll('.service-name');
                const priceInputs = document.querySelectorAll('.service-price');
                const items = [];
                for (let i = 0; i < nameInputs.length; i++) {
                    const name = nameInputs[i].value.trim();
                    const price = parseFloat(priceInputs[i].value) || 0;
                    if (name && price > 0) items.push({ name, price });
                }
                if (items.length === 0) { alert('Add at least one service'); return; }

                const total = items.reduce((s, i) => s + i.price, 0);
                const deposit = Math.round(total * 0.3);
                const balance = Math.round(total * 0.7);
                const now = new Date();
                const validUntil = new Date(now);
                validUntil.setDate(validUntil.getDate() + 7);

                const body = {
                    inquiry_id: inq.id,
                    items,
                    total,
                    deposit,
                    balance,
                    valid_until: validUntil.toISOString().split('T')[0],
                    customer_name: inq.customer_name,
                    phone: inq.phone || '',
                    event_date: inq.event_date || ''
                };

                let response;
                if (editingQuotationId) {
                    response = await fetch(`${CONFIG.API_URL}/api/quotation/${editingQuotationId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
                        body: JSON.stringify(body)
                    });
                    if (!response.ok) throw new Error('Update failed');
                    const result = await response.json();
                    if (result.success) alert('Quotation updated!');
                    else throw new Error(result.message);
                    editingQuotationId = null;
                } else {
                    response = await fetch(`${CONFIG.API_URL}/api/quotation`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
                        body: JSON.stringify(body)
                    });
                    if (!response.ok) throw new Error('Save failed');
                    const result = await response.json();
                    if (result.success) alert('Quotation saved!');
                    else throw new Error(result.message);
                }
                await loadQuotations();
                document.getElementById('whatsappOutput').classList.add('hidden');
                document.getElementById('copyBtn').classList.add('hidden');
            } catch (err) {
                console.error(err);
                alert('Error: ' + err.message);
            } finally {
                savingQuotation = false;
                btn.disabled = false;
                document.getElementById('saveQuotationText').innerText = editingQuotationId ? 'Update Quotation' : 'Generate & Save Quotation';
            }
        }

        // ------------------------------------------------------------
        // WHATSAPP
        // ------------------------------------------------------------
        function generateWhatsApp() {
            const select = document.getElementById('inquirySelect');
            if (!select.value) { alert('Select an inquiry'); return; }
            const inq = JSON.parse(select.value);
            const nameInputs = document.querySelectorAll('.service-name');
            const priceInputs = document.querySelectorAll('.service-price');
            const items = [];
            let total = 0;
            for (let i = 0; i < nameInputs.length; i++) {
                const name = nameInputs[i].value.trim();
                const price = parseFloat(priceInputs[i].value) || 0;
                if (name && price > 0) { items.push({ name, price });
                    total += price; }
            }
            if (total <= 0) { alert('Enter service prices'); return; }
            const deposit = Math.round(total * 0.3);
            const balance = Math.round(total * 0.7);

            let msg = [`Hi ${inq.customer_name},`, '', 'Thank you for your inquiry.', '', 'QUOTATION', '--------------------'];
            msg.push(`Event: ${inq.event_type || '-'}`);
            msg.push(`Date: ${inq.event_date ? new Date(inq.event_date).toLocaleDateString('en-MY') : '-'}`);
            msg.push(`Guests: ${inq.guest_count || '-'} pax`, '');
            msg.push('Services');
            items.forEach(i => msg.push(`${i.name}: RM ${i.price}`));
            msg.push('', '--------------------');
            msg.push(`Total: RM ${total}`);
            msg.push(`Deposit (30%): RM ${deposit}`);
            msg.push(`Balance: RM ${balance}`);
            const now = new Date();
            const valid = new Date(now);
            valid.setDate(valid.getDate() + 7);
            msg.push('', `Valid until: ${valid.toLocaleDateString('en-MY')}`);
            msg.push('', 'Payment Details', 'Maybank | 5xxxxx | Dekor By Ana', '', 'Thank you.');

            const output = document.getElementById('whatsappOutput');
            output.textContent = msg.join('\n');
            output.classList.remove('hidden');
            document.getElementById('copyBtn').classList.remove('hidden');

            // Open WhatsApp directly
            const phone = inq.phone || '';
            if (phone) {
                const url = `https://wa.me/${phone.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(msg.join('\n'))}`;
                window.open(url, '_blank');
            } else {
                output.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // ------------------------------------------------------------
        // PDF (placeholder)
        // ------------------------------------------------------------
        function generatePDF() {
            alert('PDF generation will be available soon. Use WhatsApp or Copy Text for now.');
        }

        // ------------------------------------------------------------
        // COPY
        // ------------------------------------------------------------
        function copyToClipboard() {
            const text = document.getElementById('whatsappOutput').textContent;
            if (!text) return alert('Nothing to copy');
            navigator.clipboard.writeText(text).then(() => alert('Copied!')).catch(() => alert('Copy failed'));
        }

        // ------------------------------------------------------------
        // DELETE / STATUS
        // ------------------------------------------------------------
        async function deleteQuotation(id) {
            if (!confirm('Delete?')) return;
            try {
                const res = await fetch(`${CONFIG.API_URL}/api/quotation/${id}`, {
                    method: 'DELETE',
                    headers: { Authorization: `Bearer ${adminToken}` }
                });
                if (res.ok) { alert('Deleted');
                    loadQuotations(); } else throw new Error('Delete failed');
            } catch (err) { console.error(err);
                alert('Delete failed'); }
        }

        async function updateQuotationStatus(id, status) {
            try {
                const res = await fetch(`${CONFIG.API_URL}/api/quotation/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
                    body: JSON.stringify({ status })
                });
                if (res.ok) loadQuotations();
            } catch (err) { console.error(err); }
        }

        // ------------------------------------------------------------
        // LOGOUT
        // ------------------------------------------------------------
        function logout() {
            localStorage.removeItem('adminToken');
            adminToken = '';
            document.getElementById('toolContent').classList.add('hidden');
            document.getElementById('passwordGate').classList.remove('hidden');
            document.getElementById('quotationForm').classList.add('hidden');
            document.getElementById('inquirySelect').value = '';
        }

        // ------------------------------------------------------------
        // INIT
        // ------------------------------------------------------------
        window.onload = function() {
            if (adminToken) {
                document.getElementById('passwordGate').classList.add('hidden');
                document.getElementById('toolContent').classList.remove('hidden');
                loadInquiries();
                loadQuotations();
                if (document.getElementById('serviceRows').children.length === 0) addServiceRow('', '');
            }
        };
    </script>

</body>
</html>
